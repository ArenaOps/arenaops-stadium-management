name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Backend Build & Test (GitHub hosted) ───────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest   # ✅ FIX: no more PowerShell issues

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore — AuthService
        run: dotnet restore BACKEND/ArenaOps.AuthService.sln

      - name: Restore — CoreService
        run: dotnet restore BACKEND/ArenaOps.CoreService/ArenaOps.CoreService.sln

      - name: Build — AuthService
        run: dotnet build BACKEND/ArenaOps.AuthService.sln --no-restore -c Release

      - name: Build — CoreService
        run: dotnet build BACKEND/ArenaOps.CoreService/ArenaOps.CoreService.sln --no-restore -c Release

      - name: Test — AuthService
        run: dotnet test BACKEND/ArenaOps.AuthService.sln --no-build -c Release

      - name: Test — CoreService
        run: dotnet test BACKEND/ArenaOps.CoreService/ArenaOps.CoreService.sln --no-build -c Release


  # ── CI: Frontend (GitHub hosted) ───────────────────────────────────
  frontend:
    name: Frontend — Lint & Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FRONTEND/arenaops-web/package-lock.json

      - name: Install dependencies
        working-directory: FRONTEND/arenaops-web
        run: npm ci

      - name: Lint
        working-directory: FRONTEND/arenaops-web
        run: npx eslint .

      - name: Type-check
        working-directory: FRONTEND/arenaops-web
        run: npx tsc --noEmit


  # ── CD: Deploy to IIS (Self-hosted) ────────────────────────────────
  deploy:
    name: Deploy to IIS
    needs: [backend, frontend]   # ✅ Only deploy if BOTH pass
    if: github.ref == 'refs/heads/main'   # ✅ Only on main branch
    runs-on: [self-hosted, windows, iis-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        run: dotnet publish BACKEND/ArenaOps.AuthService.sln -c Release -o publish

      - name: Stop IIS Site
        shell: powershell
        run: |
          Import-Module WebAdministration
          Stop-WebSite -Name "YourSiteName"

      - name: Copy Files to IIS
        run: |
          xcopy /E /Y publish\* C:\inetpub\wwwroot\YourApp\

      - name: Start IIS Site
        shell: powershell
        run: |
          Start-WebSite -Name "YourSiteName"