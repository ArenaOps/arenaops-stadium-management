events {
    worker_connections 512;
}

http {

    # ── Upstream Services ─────────────────────────────────
    upstream authservice {
        server authservice:80;
        keepalive 4;
    }

    upstream coreservice {
        server coreservice:80;
        keepalive 4;
    }

    # ── Rate Limiting (Nginx layer) ───────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── HTTP Server (Port 80) ─────────────────────────────
    # Serves traffic directly — update to redirect to HTTPS once SSL is set up
    server {
        listen 80;
        server_name _;

        # Health check (used by AWS health monitor / load balancer)
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Auth Service Routes ───────────────────────────
        location /api/auth/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://authservice/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # Forward Cookie header so the backend can read HttpOnly cookies (accessToken, refreshToken)
            proxy_set_header   Cookie            $http_cookie;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Core Service Routes ───────────────────────────────
        # NOTE: CoreService controllers use routes like api/admin, api/stadiums, api/events
        # (no "core" segment). Nginx rewrites /api/core/* → /api/* before proxying.
        location /api/core/ {
            limit_req zone=api burst=30 nodelay;

            rewrite ^/api/core/(.*)$ /api/$1 break;
            proxy_pass         http://coreservice;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # Forward Cookie header so the backend can read HttpOnly cookies (accessToken)
            proxy_set_header   Cookie            $http_cookie;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── SignalR WebSocket (SeatStatusHub) ─────────────
        location /hubs/ {
            proxy_pass         http://coreservice/hubs/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        # ── Default (catches unknown routes) ─────────────
        location / {
            return 404 "ArenaOps API — route not found\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS Server (Port 443) ───────────────────────────
    # Uncomment this entire block AFTER setting up Let's Encrypt
    # and update server_name to your actual domain.
    #
    # server {
    #     listen 443 ssl;
