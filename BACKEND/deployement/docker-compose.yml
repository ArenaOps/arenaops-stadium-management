version: '3.8'

# ============================================================
#  ArenaOps — Production Docker Compose
#  EC2 t2.micro (1GB RAM) — Two separate MonsterDB databases
# ============================================================
#
#  Before running, set these env vars in the .env file or export them:
#    AUTH_DB_CONNECTION  → your AuthService MonsterDB connection string
#    CORE_DB_CONNECTION  → your CoreService MonsterDB connection string
#    EC2_PUBLIC_IP       → your EC2 public IP (e.g. 13.60.206.243)
#    FRONTEND_URL        → your Netlify URL (e.g. https://yourapp.netlify.app)
#
#  Start: docker-compose up -d
#  Stop:  docker-compose down
# ============================================================

services:

  # ── AUTH SERVICE ──────────────────────────────────────────
  authservice:
    image: authservice:latest
    container_name: authservice
    ports:
      - "3001:80"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"

      # Database — AuthService has its own DB
      ConnectionStrings__AuthDb: "${AUTH_DB_CONNECTION}"

      # JWT
      Jwt__Issuer: "ArenaOps"
      Jwt__Audience: "ArenaOps"
      Jwt__AccessTokenExpiryMinutes: "30"
      Jwt__RefreshTokenExpiryDays: "7"
      Jwt__KeyFilePath: "Keys/rsa-private.key"

      # Google OAuth (optional — set if needed)
      GoogleAuth__ClientId: "${GOOGLE_CLIENT_ID:-}"
      GoogleAuth__ClientSecret: "${GOOGLE_CLIENT_SECRET:-}"

      # SMTP Email
      Smtp__Server: "${SMTP_SERVER:-smtp.gmail.com}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-}"
      Smtp__FromName: "ArenaOps Team"
      Smtp__EnableSsl: "true"

      # CORS — frontend origins that are allowed to call this service
      # SameSite=None cookies require HTTPS on the frontend — use your real Netlify URL
      AllowedOrigins__0: "http://${EC2_PUBLIC_IP}"
      AllowedOrigins__1: "https://${EC2_PUBLIC_IP}"
      AllowedOrigins__2: "${FRONTEND_URL}"

      # Rate Limiting
      RateLimiting__Enabled: "true"
      RateLimiting__GlobalPermitLimit: "100"
      RateLimiting__GlobalWindowSeconds: "60"

    volumes:
      # Mount RSA keys folder — authservice reads rsa-private.key to sign JWTs
      # In Production, rsa-private.key MUST exist here before container starts
      - ./Keys:/app/Keys
    restart: unless-stopped
    mem_limit: 280m
    memswap_limit: 280m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── CORE SERVICE ──────────────────────────────────────────
  coreservice:
    image: coreservice:latest
    container_name: coreservice
    ports:
      - "3002:80"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"

      # Database — CoreService has its own separate DB
      ConnectionStrings__CoreDb: "${CORE_DB_CONNECTION}"

      # JWT (validation only — uses public key)
      Jwt__Issuer: "ArenaOps"
      Jwt__Audience: "ArenaOps"

      # CORS — frontend origins that are allowed to call this service
      AllowedOrigins__0: "http://${EC2_PUBLIC_IP}"
      AllowedOrigins__1: "https://${EC2_PUBLIC_IP}"
      AllowedOrigins__2: "${FRONTEND_URL}"

      # Cache
      CacheSettings__DefaultTTLMinutes: "5"
      CacheSettings__StadiumListTTLMinutes: "2"
      CacheSettings__SeatingPlanTTLMinutes: "10"

      # Rate Limiting
      RateLimiting__Enabled: "true"
      RateLimiting__GlobalPermitLimit: "100"
      RateLimiting__GlobalWindowSeconds: "60"

    volumes:
      # CoreService only needs rsa-public.key (read-only) to validate JWTs
      - ./Keys:/app/Keys:ro
    depends_on:
      authservice:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 280m
    memswap_limit: 280m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── NGINX REVERSE PROXY ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment after setting up Let's Encrypt:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - authservice
      - coreservice
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
